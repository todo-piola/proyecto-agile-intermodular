<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="../css/estilo.css" rel="stylesheet">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="../img/logo_invisible_butaca.png">
    <script src="../js/templates-js/templates-loader.js"></script>
</head>
<body>
    <main>
        <div id="encabezado"></div>

        <section>
            <!--Plantilla para cargar las películas que coinciden con la búsqueda del usuario-->
            <template id="template-pelicula">
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <!-- Versión escritorio (visible en md+) -->
                        <div class="d-none d-md-block">
                            <img class="card-img-top" src="" alt="Imagen película" style="height: 250px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title"></h5>
                                <p class="card-text"><strong>Año:</strong> <span class="anio"></span></p>
                                <p class="card-text"><strong>Director:</strong> <span class="director"></span></p>
                                <p class="card-text small text-muted"><span class="descripcion"></span></p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="h5 mb-0 precio"></span>
                                    <button class="btn btn-primary btn-alquilar">Alquilar</button>
                                </div>
                            </div>
                        </div>

                        <!-- Versión móvil (visible solo en sm-) -->
                        <div class="d-md-none">
                            <div class="row g-0">
                                <div class="col-4">
                                    <img class="img-fluid h-100" src="" alt="Imagen película" style="object-fit: cover;">
                                </div>
                                <div class="col-8">
                                    <div class="card-body">
                                        <h6 class="card-title fw-bold mb-1"></h6>
                                        <p class="card-text small mb-1">
                                            <span class="anio"></span> | <span class="director"></span>
                                        </p>
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="small fw-bold precio"></span>
                                            <button class="btn btn-sm btn-primary btn-alquilar">Alquilar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <div id="resultados" class="row"></div>
            <div id="sinResultados" class="text-warning"></div>

        </section>

        <div id="piepagina"></div>
    </main>

<script type="module" src="../js/main.js"></script>
</body>
</html>
